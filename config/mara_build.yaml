# config/mara_build.yaml
# =============================================================================
# MARA Build Configuration - Single Source of Truth
# =============================================================================
# This file defines ALL shared settings between firmware and host.
# Run `mara generate all` to regenerate:
#   - firmware/mcu/include/config/GeneratedBuildConfig.h
#   - firmware/mcu/include/config/GeneratedLimits.h
#   - host/mara_host/core/_generated_config.py
# =============================================================================

# -----------------------------------------------------------------------------
# Target Platform
# -----------------------------------------------------------------------------
# This is the ONE PLACE to configure the target MCU platform.
# Changing this will regenerate the correct HAL selection.
#
# Supported platforms:
#   - esp32: ESP32, ESP32-S2, ESP32-S3, ESP32-C3
#   - stm32: STM32 family (future)
#   - rp2040: Raspberry Pi Pico (future)
#   - native: Host/test builds (stubs)
#
# Supported SDKs:
#   - arduino: Arduino framework (default)
#   - espidf: ESP-IDF native (future)
#   - mbed: Mbed OS (future)
#
platform:
  target: esp32           # Target MCU: esp32 | stm32 | rp2040 | native
  board: esp32dev         # PlatformIO board name
  sdk: arduino            # SDK/framework: arduino | espidf | mbed
  variant: ""             # Optional variant (e.g., "s3" for ESP32-S3)

# -----------------------------------------------------------------------------
# Transport Settings
# -----------------------------------------------------------------------------
transport:
  baud_rate: 921600        # Runtime serial communication
  upload_baud_rate: 460800 # Firmware flashing (esptool)
  tcp_port: 3333           # TCP server port
  device_name: "ESP32-bot" # mDNS/BLE device name

# -----------------------------------------------------------------------------
# Feature Categories
# -----------------------------------------------------------------------------
# Used for CLI display and code organization
categories:
  Transport:
    - wifi
    - ble
    - uart_transport
    - mqtt_transport
  Motors:
    - servo
    - stepper
    - dc_motor
    - encoder
    - motion_controller
  Sensors:
    - ultrasonic
    - imu
    - lidar
  Control:
    - signal_bus
    - control_kernel
    - pid_controller
    - state_space
    - observer
    - control_module
  System:
    - ota
    - telemetry
    - heartbeat
    - logging
    - identity
  Audio:
    - audio
  Debug:
    - benchmark

# -----------------------------------------------------------------------------
# Feature Dependencies
# -----------------------------------------------------------------------------
# Validation rules: feature -> [required features]
dependencies:
  mqtt_transport: [wifi]
  control_kernel: [signal_bus]
  observer: [signal_bus]
  control_module: [control_kernel]
  state_space: [control_kernel]

# -----------------------------------------------------------------------------
# Feature Profiles
# -----------------------------------------------------------------------------
# Each profile defines which features are compiled into firmware.
# The host uses this to know what capabilities to expect.

profiles:
  # MINIMAL: UART only, basic telemetry, smallest flash footprint (~350KB)
  minimal:
    # Transport
    wifi: false
    ble: false
    uart_transport: true
    mqtt_transport: false
    # Motors
    servo: false
    stepper: false
    dc_motor: false
    encoder: false
    motion_controller: false
    # Sensors
    ultrasonic: false
    imu: false
    lidar: false
    # Control
    signal_bus: false
    control_kernel: false
    pid_controller: false
    state_space: false
    observer: false
    control_module: false
    # System
    ota: false
    telemetry: true
    heartbeat: true
    logging: false
    identity: false
    # Audio
    audio: false
    # Benchmark
    benchmark: false

  # MOTORS: Motor control without network (~550KB)
  motors:
    wifi: false
    ble: false
    uart_transport: true
    mqtt_transport: false
    servo: true
    stepper: true
    dc_motor: true
    encoder: true
    motion_controller: true
    ultrasonic: false
    imu: false
    lidar: false
    signal_bus: false
    control_kernel: false
    pid_controller: false
    state_space: false
    observer: false
    control_module: false
    ota: false
    telemetry: true
    heartbeat: true
    logging: true
    identity: false
    audio: false
    benchmark: false

  # SENSORS: WiFi + all sensors, data collection (~600KB)
  sensors:
    wifi: true
    ble: false
    uart_transport: true
    mqtt_transport: false
    servo: false
    stepper: false
    dc_motor: false
    encoder: false
    motion_controller: false
    ultrasonic: true
    imu: true
    lidar: true
    signal_bus: false
    control_kernel: false
    pid_controller: false
    state_space: false
    observer: false
    control_module: false
    ota: true
    telemetry: true
    heartbeat: true
    logging: true
    identity: true
    audio: false
    benchmark: false

  # CONTROL: Full control system with motors (~750KB)
  control:
    wifi: true
    ble: false
    uart_transport: true
    mqtt_transport: false
    servo: true
    stepper: true
    dc_motor: true
    encoder: true
    motion_controller: true
    ultrasonic: false
    imu: true
    lidar: false
    signal_bus: true
    control_kernel: true
    pid_controller: true
    state_space: true
    observer: true
    control_module: true
    ota: true
    telemetry: true
    heartbeat: true
    logging: true
    identity: true
    audio: false
    benchmark: true

  # FULL: Everything enabled (~870KB)
  full:
    wifi: true
    ble: true
    uart_transport: true
    mqtt_transport: true
    servo: true
    stepper: true
    dc_motor: true
    encoder: true
    motion_controller: true
    ultrasonic: true
    imu: true
    lidar: true
    signal_bus: true
    control_kernel: true
    pid_controller: true
    state_space: true
    observer: true
    control_module: true
    ota: true
    telemetry: true
    heartbeat: true
    logging: true
    identity: true
    audio: false
    benchmark: true

# -----------------------------------------------------------------------------
# Resource Limits
# -----------------------------------------------------------------------------
# Compile-time limits for control system resources.
# These affect memory allocation and must be set appropriately for your use case.
limits:
  # SignalBus: Maximum number of signals that can be defined
  max_signals: 128

  # ControlKernel: Maximum controller slots
  max_control_slots: 8

  # ControlKernel: Maximum state dimension for state-space controllers
  max_states: 6

  # ControlKernel: Maximum input dimension for controllers
  max_inputs: 2

  # Observer: Maximum number of observer instances
  max_observers: 4

  # Observer: Maximum output dimension
  max_outputs: 4

  # ControlGraph: Maximum slots in a control graph
  max_graph_slots: 8

# -----------------------------------------------------------------------------
# Active Profile
# -----------------------------------------------------------------------------
# Change this to switch which profile is used for builds
active_profile: full
