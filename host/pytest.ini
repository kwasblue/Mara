[pytest]
pythonpath = .
testpaths = tests
asyncio_mode = auto
markers =
    hil: Hardware-in-the-loop tests (require connected MCU)
    motion: Tests that move actuators (require safe environment)
    dc_motor: Tests requiring DC motor hardware (HAS_DC_MOTOR)
    stepper: Tests requiring stepper motor hardware (HAS_STEPPER)
    servo: Tests requiring servo hardware (HAS_SERVO)
    encoder: Tests requiring encoder hardware (HAS_ENCODER)
    imu: Tests requiring IMU hardware (HAS_IMU)
    integration: Integration tests (require actual tools installed)
    slow: Tests that take a long time to run
